server {
    listen 8080;
    server_name _;

    root /var/www/html/public;
    index index.php;

    # X-Frame-Options / CSP / COOP etc. are owned by the Laravel SecurityHeaders
    # middleware (single source of truth — avoids duplicate-header findings).
    # nginx only needs X-Content-Type-Options on directly-served static assets,
    # which bypass PHP and therefore never hit the middleware.
    add_header X-Content-Type-Options "nosniff" always;

    # Vite build assets — long-lived cache (filenames are content-hashed)
    location ~* ^/build/ {
        expires 1y;
        # add_header in a location replaces inherited add_headers, so re-assert nosniff.
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # Static assets
    location ~* \.(ico|css|js|gif|jpe?g|png|svg|webp|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # Main Laravel front controller
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 300;
    }

    # Deny access to dotfiles
    location ~ /\. {
        deny all;
    }
}
