server {
    listen 8080;
    server_name _;

    root /var/www/html/public;
    index index.php;

    # Security headers are handled by Laravel middleware (SecurityHeaders),
    # but a basic set is applied here for defence-in-depth.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Vite build assets — long-lived cache (filenames are content-hashed)
    location ~* ^/build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Static assets
    location ~* \.(ico|css|js|gif|jpe?g|png|svg|webp|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Main Laravel front controller
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 300;
    }

    # Deny access to dotfiles
    location ~ /\. {
        deny all;
    }
}
