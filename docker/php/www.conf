; PHP-FPM pool for Onboard.Ninja

[www]
user = www-data
group = www-data

; Listen on TCP so nginx can reach it by 127.0.0.1:9000
listen = 127.0.0.1:9000

pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.process_idle_timeout = 10s
pm.max_requests = 500

; Send FPM logs to stderr so Docker captures them
php_admin_value[error_log] = /dev/stderr
php_admin_flag[log_errors] = on

; Clear environment so only explicit env vars are visible
clear_env = no
