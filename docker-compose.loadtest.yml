# Docker Compose overlay for load testing with resource constraints.
#
# Provides three profiles to determine minimum and recommended hardware
# specifications for self-hosting.
#
# Usage (pick one profile):
#
#   # Minimum (1.5 GB total) — tests the lower bound
#   LOADTEST_PROFILE=minimum docker compose \
#     -f docker-compose.prod.yml -f docker-compose.loadtest.yml up -d --build
#
#   # Recommended (2.5 GB total) — expected production config
#   LOADTEST_PROFILE=recommended docker compose \
#     -f docker-compose.prod.yml -f docker-compose.loadtest.yml up -d --build
#
#   # Comfortable (4.5 GB total) — generous resources
#   LOADTEST_PROFILE=comfortable docker compose \
#     -f docker-compose.prod.yml -f docker-compose.loadtest.yml up -d --build
#
# Then run k6:
#   k6 run tests/load/claim-api.js -e BASE_URL=http://localhost:8080 -e CAMPAIGN_ID=...
#
# Capture docker stats during the test:
#   docker stats --no-stream --format "table {{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}\t{{.MemPerc}}"

services:

  # --- Minimum profile: 1 CPU / 512 MB app / 512 MB MySQL / 128 MB Redis ---
  app:
    ports: !override
      - "8081:8080"
    environment:
      APP_KEY: "base64:lI6gNEZbi2sItf0uOYVt5Ybi5L2N711OmNIkQNcIZtA="
      APP_ENV: local
      APP_DEBUG: "true"
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: "${DB_DATABASE:-onboard}"
      DB_USERNAME: "${DB_USERNAME:-onboard}"
      DB_PASSWORD: "${DB_PASSWORD:-secret}"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_DRIVER: file
      SESSION_DRIVER: file
      TRANSACTION_BACKEND: "null"
    deploy:
      resources:
        limits:
          cpus: "${APP_CPUS:-1.0}"
          memory: "${APP_MEMORY:-512M}"

  mysql:
    ports: !override
      - "3307:3306"
    deploy:
      resources:
        limits:
          cpus: "${MYSQL_CPUS:-0.5}"
          memory: "${MYSQL_MEMORY:-512M}"

  redis:
    deploy:
      resources:
        limits:
          cpus: "${REDIS_CPUS:-0.25}"
          memory: "${REDIS_MEMORY:-128M}"
